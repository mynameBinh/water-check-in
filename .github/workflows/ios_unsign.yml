name: Build Unsigned Expo React Native IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Initialize Apple CoreSimulator Service
        run: |
          xcrun simctl list runtimes
          sudo xcodebuild -runFirstLaunch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Install JavaScript Dependencies
        run: |
          if [ -f "yarn.lock" ]; then
            yarn install
          elif [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      # Ép gỡ bỏ gói cũ để tránh lỗi "unknown option --fix"
      - name: Clean Legacy Expo CLI
        run: |
          npm uninstall -g expo-cli || true
          npm uninstall expo-cli @expo/ui expo-ui || true
          yarn remove expo-cli @expo/ui expo-ui || true

      # Dùng lệnh kiểm tra & tự động sửa dependencies thế hệ mới (Không lỗi option)
      - name: Check and Fix Expo Dependencies
        run: |
          echo "y" | npx expo install --check

      - name: Setup Ruby and Cocoapods Cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Cocoapods
        run: |
          cd ios
          pod install
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Build Expo iOS JS Bundle
        run: npx expo export --platform ios

      - name: Modify Deployment Target in Xcode Project File
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/IPHONEOS_DEPLOYMENT_TARGET = 17.0;/g' ios/*.xcodeproj/project.pbxproj || true
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/IPHONEOS_DEPLOYMENT_TARGET = 17.0;/g' ios/*.xcodeproj/project.pbxproj || true

      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios
          set -o pipefail && xcodebuild -workspace *.xcworkspace \
            -scheme $(ls -d *.xcodeproj | sed 's/\.xcodeproj//') \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            IPHONEOS_DEPLOYMENT_TARGET="17.0" \
            -sdk iphoneos \
            clean build | xcbeautify --quieter

      - name: Pack Unsigned IPA
        run: |
          cd ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/
          mkdir Payload
          cp -r *.app Payload/
          zip -r expo_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: expo-unsigned-ipa
          path: ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/expo_unsigned.ipa
